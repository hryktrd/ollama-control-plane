services:
  controller:
    build: .
    env_file: .env
    ports:
      # ループバックのみ公開。ネイティブ Nginx が 8200 → 8000 へプロキシする
      - "127.0.0.1:8200:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
